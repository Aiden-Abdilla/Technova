<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TechNova Electronics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="images/logo.jpg" alt="TechNova Logo" class="logo-img">
            </a>
        </div>
        
        <button id="menu-toggle">Menu</button>
        
        <nav id="main-nav">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div class="contact-container">
            <h1>Contact Us</h1>
            <p>Have a question? Send us a message and we will get back to you as soon as possible.</p>

            <form id="contact-form" action="mailto:info@abdilla.net" method="post" enctype="text/plain">
                
                <label for="user-name">Full Name:</label>
                <input type="text" id="user-name" name="name" class="form-input" placeholder="Your Name" required>

                <label for="user-email">Email Address:</label>
                <input type="email" id="user-email" name="email" class="form-input" placeholder="Your Email" required>

                <label for="user-message">Message:</label>
                <textarea id="user-message" name="message" class="form-input" rows="5" placeholder="Write your message here..." required></textarea>

                <button type="submit">Send Message</button>
                
                <div id="form-error" class="error-msg" style="display:none; color: #e74c3c; font-weight: bold; margin-top: 10px;">
                    Please fill in all fields before submitting.
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p> &copy; 2026 TechNova Electronics</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
