<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Contact - TechNova Electronics</title>

    <link rel="stylesheet" href="style.css">

    <!-- jQuery must load before script.js -->
    <script
        src="https://code.jquery.com/jquery-3.6.0.min.js"
        defer
    ></script>

    <script src="script.js" defer></script>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img
                    src="images/logo.jpg"
                    alt="TechNova Electronics logo"
                    class="logo-img"
                >
            </a>
        </div>

        <button
            type="button"
            id="menu-toggle"
            aria-expanded="false"
            aria-controls="main-nav"
        >
            Menu
        </button>

        <nav id="main-nav">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <div class="contact-container">

            <h1>Contact Us</h1>

            <p>
                Complete the form below and we will get back to you
                as soon as possible.
            </p>

            <form
                id="contact-form"
                action="mailto:Info@abdilla.net"
                method="post"
                enctype="text/plain"
                novalidate
            >

                <!-- Full name input -->
                <div class="form-group">
                    <label for="user-name">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="user-name"
                        name="Full Name"
                        class="form-input"
                        placeholder="Enter your full name"
                    >

                    <small
                        id="name-error"
                        class="input-error"
                    ></small>
                </div>

                <!-- Email input -->
                <div class="form-group">
                    <label for="user-email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="user-email"
                        name="Email Address"
                        class="form-input"
                        placeholder="Enter your email address"
                    >

                    <small
                        id="email-error"
                        class="input-error"
                    ></small>
                </div>

                <!-- Contact number input -->
                <div class="form-group">
                    <label for="user-phone">
                        Contact Number
                    </label>

                    <input
                        type="tel"
                        id="user-phone"
                        name="Contact Number"
                        class="form-input"
                        placeholder="Enter your contact number"
                    >

                    <small
                        id="phone-error"
                        class="input-error"
                    ></small>
                </div>

                <!-- Message input -->
                <div class="form-group">
                    <label for="user-message">
                        Message
                    </label>

                    <textarea
                        id="user-message"
                        name="Message"
                        class="form-input"
                        rows="6"
                        placeholder="Enter your message"
                    ></textarea>

                    <small
                        id="message-error"
                        class="input-error"
                    ></small>
                </div>

                <!-- General form error -->
                <p
                    id="form-error"
                    role="alert"
                ></p>

                <button
                    type="submit"
                    class="submit-btn"
                >
                    Send Message
                </button>

            </form>

        </div>

    </main>

    <footer>
        <p>
            &copy; 2026 TechNova Electronics. All rights reserved.
        </p>
    </footer>

</body>

</html>
