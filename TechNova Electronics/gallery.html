<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Gallery - TechNova Electronics</title>

    <link rel="stylesheet" href="style.css">

    <!-- Magnific Popup CSS -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.2.0/magnific-popup.min.css"
    >

    <!-- jQuery -->
    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js"
        defer
    ></script>

    <!-- Magnific Popup plugin -->
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.2.0/jquery.magnific-popup.min.js"
        defer
    ></script>

    <!-- Website JavaScript -->
    <script src="script.js" defer></script>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img
                    src="images/logo.jpg"
                    alt="TechNova Electronics logo"
                    class="logo-img"
                >
            </a>
        </div>

        <button
            type="button"
            id="menu-toggle"
            aria-expanded="false"
            aria-controls="main-nav"
        >
            Menu
        </button>

        <nav id="main-nav">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <h1 class="section-title">
            Product Gallery
        </h1>

        <p class="gallery-introduction">
            Click an image to view it at full size.
        </p>

        <div class="gallery-container">

            <a
                href="images/headphones.jpg"
                class="gallery-image"
                title="Wireless Headphones"
            >
                <img
                    src="images/headphones.jpg"
                    alt="Wireless headphones"
                >
            </a>

            <a
                href="images/keyboard.jpg"
                class="gallery-image"
                title="Mechanical Keyboard"
            >
                <img
                    src="images/keyboard.jpg"
                    alt="Mechanical keyboard"
                >
            </a>

            <a
                href="images/smartwatch.jpg"
                class="gallery-image"
                title="Smartwatch"
            >
                <img
                    src="images/smartwatch.jpg"
                    alt="Smartwatch"
                >
            </a>

            <a
                href="images/speaker.jpg"
                class="gallery-image"
                title="Bluetooth Speaker"
            >
                <img
                    src="images/speaker.jpg"
                    alt="Bluetooth speaker"
                >
            </a>

            <a
                href="images/gaming_pc.jpg"
                class="gallery-image"
                title="NovaStrike Gaming PC"
            >
                <img
                    src="images/gaming_pc.jpg"
                    alt="NovaStrike Gaming PC"
                >
            </a>

            <a
                href="images/monitor.jpg"
                class="gallery-image"
                title="UltraView Monitor"
            >
                <img
                    src="images/monitor.jpg"
                    alt="UltraView gaming monitor"
                >
            </a>

        </div>

    </main>

    <footer>
        <p>
            &copy; 2026 TechNova Electronics. All rights reserved.
        </p>
    </footer>

</body>

</html>
